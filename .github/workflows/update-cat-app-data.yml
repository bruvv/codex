name: Update Cat App Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-cat-app-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build latest data
        run: python3 build_cat_app_data.py

      - name: Commit and push if changed
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- data/cat_app_data.json; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cat_app_data.json
          git commit -m "chore: update cat_app_data.json"
          git push origin "HEAD:${BRANCH_NAME}"
